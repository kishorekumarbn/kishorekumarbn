<svg width="100%" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink { 0%,49%{opacity:1} 50%,99%{opacity:0} }
      @keyframes bar1 { 0%,100%{height:14px} 50%{height:32px} }
      @keyframes bar2 { 0%,100%{height:24px} 33%{height:42px} }
      @keyframes bar3 { 0%,100%{height:8px} 66%{height:46px} }
      @keyframes bar4 { 0%,100%{height:34px} 40%{height:16px} }
      @keyframes bar5 { 0%,100%{height:18px} 55%{height:38px} }
      @keyframes nodepulse { 0%,70%,100%{fill:#534AB7;r:5} 75%{fill:#FAC775;r:7} 80%{fill:#534AB7;r:5} }
      @keyframes nodepulse2 { 0%,55%,100%{fill:#534AB7;r:5} 60%{fill:#1D9E75;r:7} 65%{fill:#534AB7;r:5} }
      .cursor { animation: blink 1s step-end infinite; }
      .b1 { animation: bar1 1.8s ease-in-out infinite; transform-origin: center bottom; }
      .b2 { animation: bar2 2.1s ease-in-out infinite 0.3s; transform-origin: center bottom; }
      .b3 { animation: bar3 1.6s ease-in-out infinite 0.7s; transform-origin: center bottom; }
      .b4 { animation: bar4 2.4s ease-in-out infinite 1s; transform-origin: center bottom; }
      .b5 { animation: bar5 1.9s ease-in-out infinite 1.4s; transform-origin: center bottom; }
      .np { animation: nodepulse 4s ease-in-out infinite 1s; }
      .np2 { animation: nodepulse2 4s ease-in-out infinite 2.2s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" rx="14" fill="#0D1117"/>

  <!-- Grid -->
  <g opacity="0.05" stroke="#7F77DD" stroke-width="0.6">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="200" y1="0" x2="200" y2="160"/>
    <line x1="400" y1="0" x2="400" y2="160"/>
    <line x1="600" y1="0" x2="600" y2="160"/>
  </g>

  <!-- === LEFT: Neural net === -->
  <!-- connections -->
  <g stroke="#7F77DD" stroke-width="0.5" opacity="0.3">
    <line x1="36" y1="55" x2="68" y2="46"/><line x1="36" y1="55" x2="68" y2="68"/>
    <line x1="36" y1="80" x2="68" y2="68"/><line x1="36" y1="80" x2="68" y2="91"/>
    <line x1="36" y1="105" x2="68" y2="91"/><line x1="36" y1="105" x2="68" y2="113"/>
    <line x1="74" y1="46" x2="106" y2="57"/><line x1="74" y1="68" x2="106" y2="57"/>
    <line x1="74" y1="68" x2="106" y2="80"/><line x1="74" y1="91" x2="106" y2="80"/>
    <line x1="74" y1="113" x2="106" y2="103"/>
    <line x1="112" y1="57" x2="140" y2="68"/><line x1="112" y1="80" x2="140" y2="68"/>
    <line x1="112" y1="80" x2="140" y2="92"/><line x1="112" y1="103" x2="140" y2="92"/>
  </g>
  <!-- layer 1 -->
  <circle cx="36" cy="55" r="5" fill="#534AB7" opacity="0.6"/>
  <circle cx="36" cy="80" r="5" fill="#534AB7" opacity="0.6"/>
  <circle cx="36" cy="105" r="5" fill="#534AB7" opacity="0.6"/>
  <!-- layer 2 -->
  <circle cx="70" cy="46" r="5" fill="#534AB7" opacity="0.5"/>
  <circle class="np" cx="70" cy="68" r="5" fill="#534AB7"/>
  <circle cx="70" cy="91" r="5" fill="#534AB7" opacity="0.5"/>
  <circle cx="70" cy="113" r="5" fill="#534AB7" opacity="0.5"/>
  <!-- layer 3 -->
  <circle cx="108" cy="57" r="5" fill="#534AB7" opacity="0.5"/>
  <circle class="np2" cx="108" cy="80" r="5" fill="#534AB7"/>
  <circle cx="108" cy="103" r="5" fill="#534AB7" opacity="0.5"/>
  <!-- layer 4 (output) -->
  <circle cx="142" cy="68" r="5" fill="#1D9E75" opacity="0.7"/>
  <circle cx="142" cy="92" r="5" fill="#1D9E75" opacity="0.7"/>
  <!-- label -->
  <text x="90" y="140" text-anchor="middle" font-size="8" fill="#534AB7" opacity="0.6" font-family="monospace">neural net</text>

  <!-- === CENTER: Terminal === -->
  <rect x="162" y="18" width="466" height="122" rx="8" fill="#161B22"/>
  <!-- title bar -->
  <rect x="162" y="18" width="466" height="20" rx="8" fill="#21262D"/>
  <rect x="162" y="30" width="466" height="8" fill="#21262D"/>
  <!-- dots -->
  <circle cx="178" cy="28" r="4.5" fill="#FF5F56"/>
  <circle cx="195" cy="28" r="4.5" fill="#FFBD2E"/>
  <circle cx="212" cy="28" r="4.5" fill="#27C93F"/>
  <text x="395" y="32" text-anchor="middle" font-size="9" fill="#8B949E" font-family="monospace">kishore@srmist: ~/projects</text>

  <!-- line 1: command -->
  <text x="176" y="57" font-size="10.5" fill="#1D9E75" font-family="monospace">❯</text>
  <text x="190" y="57" font-size="10.5" fill="#58A6FF" font-family="monospace">python</text>
  <text x="238" y="57" font-size="10.5" fill="#E6EDF3" font-family="monospace">train.py --epochs 9999 --patience infinite</text>

  <!-- line 2: epoch output -->
  <text x="176" y="75" font-size="10" fill="#8B949E" font-family="monospace">Epoch 9998/9999  ▓▓▓▓▓▓▓▓▓░  loss: 0.0021  acc: 98.7%</text>

  <!-- line 3: funny -->
  <text x="176" y="92" font-size="10" fill="#3FB950" font-family="monospace">✓  Model converged!</text>
  <text x="316" y="92" font-size="10" fill="#8B949E" font-family="monospace">(only took 47 architectures)</text>

  <!-- line 4 -->
  <text x="176" y="109" font-size="10.5" fill="#1D9E75" font-family="monospace">❯</text>
  <text x="190" y="109" font-size="10.5" fill="#58A6FF" font-family="monospace">git</text>
  <text x="214" y="109" font-size="10.5" fill="#E6EDF3" font-family="monospace">commit -m</text>
  <text x="305" y="109" font-size="10.5" fill="#A5D6FF" font-family="monospace">"fixed it (trust me)"</text>

  <!-- line 5: current prompt with blink -->
  <text x="176" y="128" font-size="10.5" fill="#1D9E75" font-family="monospace">❯</text>
  <text x="190" y="128" font-size="10.5" fill="#E6EDF3" font-family="monospace">git push</text>
  <rect class="cursor" x="266" y="117" width="7" height="13" fill="#1D9E75"/>

  <!-- === RIGHT: Live bar chart === -->
  <!-- chart bg -->
  <rect x="642" y="30" width="114" height="100" rx="6" fill="#161B22" opacity="0.8"/>
  <!-- bars anchored at y=117 -->
  <!-- using animateTransform alternative: just fixed-position rects with keyframe height + fixed bottom y -->
  <rect class="b1" x="652" y="103" width="14" height="14" rx="2" fill="#534AB7" opacity="0.85"/>
  <rect class="b2" x="670" y="95" width="14" height="24" rx="2" fill="#7F77DD" opacity="0.85"/>
  <rect class="b3" x="688" y="109" width="14" height="8"  rx="2" fill="#1D9E75" opacity="0.85"/>
  <rect class="b4" x="706" y="83"  width="14" height="34" rx="2" fill="#534AB7" opacity="0.85"/>
  <rect class="b5" x="724" y="99" width="14" height="18" rx="2" fill="#EF9F27" opacity="0.85"/>
  <!-- axis -->
  <line x1="646" y1="117" x2="746" y2="117" stroke="#7F77DD" stroke-width="0.8" opacity="0.35"/>
  <text x="696" y="130" text-anchor="middle" font-size="8" fill="#7F77DD" opacity="0.5" font-family="monospace">metrics</text>
  <text x="696" y="142" text-anchor="middle" font-size="7.5" fill="#8B949E" opacity="0.4" font-family="monospace">live training</text>
</svg>
